name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      
      - name: Find requirements.txt
        run: |
          echo "Listing all files:"
          ls -la
          echo "Searching for requirements.txt:"
          find . -name "requirements.txt"
      
      - name: Install dependencies
        run: |
          # اگر requirements.txt در پوشه‌ی mlops-pipeline است، به آنجا برو
          if [ -f "mlops-pipeline/requirements.txt" ]; then
            cd mlops-pipeline
          elif [ -f "requirements.txt" ]; then
            echo "requirements.txt found in root"
          else
            echo "ERROR: requirements.txt not found!"
            exit 1
          fi
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          # اگر به پوشه‌ی mlops-pipeline رفتیم، برای اجرای تست‌ها هم باید آنجا باشیم
          if [ -d "mlops-pipeline" ] && [ -f "mlops-pipeline/tests/test_pipeline.py" ]; then
            cd mlops-pipeline
          fi
          pytest tests/ -v
