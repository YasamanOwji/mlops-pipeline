name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Find requirements.txt
        run: |
          echo "Listing all files:"
          ls -la
          echo "Searching for requirements.txt:"
          find . -name "requirements.txt"
      - name: Install dependencies
        run: |
          FILE=$(find . -name "requirements.txt" | head -1)
          if [ -z "$FILE" ]; then
            echo "ERROR: requirements.txt not found!"
            exit 1
          fi
          echo "Found requirements.txt at: $FILE"
          DIR=$(dirname "$FILE")
          cd "$DIR"
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: |
          FILE=$(find . -name "requirements.txt" | head -1)
          if [ -n "$FILE" ]; then
            DIR=$(dirname "$FILE")
            cd "$DIR"
          fi
          pytest tests/ -v
