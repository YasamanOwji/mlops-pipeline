data:
  raw_path: "data/gamified_learning_engagement.csv"
  target_column: "churned_next_30d"

dvc:
  remote_name: "local_remote"
  remote_path: "../dvc-storage"

mlflow:
  tracking_uri: "file:./mlruns"
  experiment_name: "churn-prediction"
  registered_model_name: "churn_model"

model:
  type: "random_forest"
  params:
    n_estimators: 200
    max_depth: 8
    random_state: 42

deployment:
  staging_dir: "deployment/staging"
  production_dir: "deployment/production"

api:
  host: "0.0.0.0"
  port: 8000

monitoring:
  report_dir: "monitoring_reports"
  drift_threshold: 0.1
